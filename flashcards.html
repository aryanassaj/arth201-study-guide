<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTH201 Midterm Flashcards</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
.header { background: #16213e; padding: 20px; text-align: center; border-bottom: 3px solid #e94560; }
.header h1 { font-size: 1.8em; color: #e94560; }
.header p { color: #aaa; margin-top: 5px; }
.controls { display: flex; gap: 10px; justify-content: center; padding: 15px; flex-wrap: wrap; }
.controls button, .controls select { padding: 8px 16px; border: 1px solid #e94560; background: #16213e; color: #eee; border-radius: 5px; cursor: pointer; font-size: 0.9em; }
.controls button:hover, .controls select:hover { background: #e94560; }
.controls button.active { background: #e94560; }
.stats { text-align: center; padding: 10px; color: #aaa; font-size: 0.9em; }
.card-container { display: flex; justify-content: center; align-items: center; padding: 20px; min-height: 500px; }
.card { width: 90%; max-width: 700px; min-height: 400px; perspective: 1000px; cursor: pointer; }
.card-inner { position: relative; width: 100%; min-height: 400px; transition: transform 0.6s; transform-style: preserve-3d; }
.card.flipped .card-inner { transform: rotateY(180deg); }
.card-front, .card-back { position: absolute; width: 100%; min-height: 400px; backface-visibility: hidden; border-radius: 12px; padding: 30px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
.card-front { background: linear-gradient(135deg, #0f3460, #16213e); border: 2px solid #e94560; }
.card-back { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 2px solid #53d769; transform: rotateY(180deg); }
.card-front h2 { color: #e94560; font-size: 1.5em; margin-bottom: 15px; text-align: center; }
.card-front .prompt { font-size: 1.1em; color: #ccc; text-align: center; }
.card-front .hint { font-size: 0.85em; color: #666; margin-top: 15px; }
.card-back h3 { color: #53d769; font-size: 1.3em; margin-bottom: 10px; }
.card-back .detail { margin: 5px 0; font-size: 1em; }
.card-back .detail span { color: #e94560; font-weight: bold; }
.card-back .iconography { margin-top: 10px; padding: 10px; background: rgba(83, 215, 105, 0.1); border-radius: 8px; font-size: 0.9em; color: #aaa; }
.nav-buttons { display: flex; justify-content: center; gap: 20px; padding: 20px; }
.nav-buttons button { padding: 12px 30px; border: none; border-radius: 8px; font-size: 1em; cursor: pointer; font-weight: bold; }
.btn-prev { background: #0f3460; color: #eee; }
.btn-next { background: #e94560; color: #fff; }
.btn-prev:hover { background: #1a4a8a; }
.btn-next:hover { background: #ff6b81; }
.mode-selector { display: flex; gap: 10px; justify-content: center; padding: 10px; flex-wrap: wrap; }
.mode-selector button { padding: 6px 14px; border: 1px solid #444; background: #1a1a2e; color: #aaa; border-radius: 20px; cursor: pointer; font-size: 0.85em; }
.mode-selector button.active { border-color: #e94560; color: #e94560; background: rgba(233, 69, 96, 0.1); }
.search-box { text-align: center; padding: 10px; }
.search-box input { padding: 8px 16px; width: 300px; max-width: 90%; border: 1px solid #444; background: #16213e; color: #eee; border-radius: 5px; font-size: 0.95em; }
.period-tag { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.75em; font-weight: bold; margin-bottom: 10px; }
.medieval { background: rgba(255, 165, 0, 0.2); color: #ffa500; border: 1px solid #ffa500; }
.northern { background: rgba(0, 191, 255, 0.2); color: #00bfff; border: 1px solid #00bfff; }
.early-ren { background: rgba(50, 205, 50, 0.2); color: #32cd32; border: 1px solid #32cd32; }
.high-ren { background: rgba(147, 112, 219, 0.2); color: #9370db; border: 1px solid #9370db; }
.mannerism { background: rgba(255, 105, 180, 0.2); color: #ff69b4; border: 1px solid #ff69b4; }
.baroque { background: rgba(255, 215, 0, 0.2); color: #ffd700; border: 1px solid #ffd700; }
.click-hint { color: #555; font-size: 0.8em; margin-top: 20px; }
table { width: 100%; border-collapse: collapse; margin: 20px 0; }
table th { background: #16213e; color: #e94560; padding: 8px; text-align: left; font-size: 0.85em; }
table td { padding: 8px; border-bottom: 1px solid #333; font-size: 0.85em; }
table tr:hover { background: rgba(233, 69, 96, 0.05); }
.table-view { padding: 20px; max-width: 1200px; margin: 0 auto; display: none; }
.table-view h2 { color: #e94560; margin: 20px 0 10px; }
#viewToggle { position: fixed; top: 10px; right: 10px; z-index: 100; }
</style>
</head>
<body>

<div class="header">
<h1>ARTH201 Midterm Flashcards</h1>
<p>Click card to flip | Arrow keys or buttons to navigate | ~163 artworks</p>
</div>

<button id="viewToggle" onclick="toggleView()" style="padding:8px 16px;border:1px solid #e94560;background:#16213e;color:#eee;border-radius:5px;cursor:pointer;">Switch to Table View</button>

<div id="flashcardView">
<div class="mode-selector">
<button class="active" onclick="setMode('all',this)">All Periods</button>
<button onclick="setMode('medieval',this)">Medieval</button>
<button onclick="setMode('northern',this)">Northern Ren</button>
<button onclick="setMode('early-ren',this)">Early Renaissance</button>
<button onclick="setMode('high-ren',this)">High Renaissance</button>
<button onclick="setMode('mannerism',this)">Mannerism</button>
<button onclick="setMode('baroque',this)">Baroque</button>
</div>

<div class="controls">
<button onclick="shuffleCards()" title="Randomize order">Shuffle</button>
<select id="quizMode" onchange="setQuizMode(this.value)">
<option value="show-image">Mode: See Title, Guess Details</option>
<option value="show-details">Mode: See Details, Name the Work</option>
<option value="identify-period">Mode: Identify the Period/Style</option>
</select>
</div>

<div class="stats" id="stats">Card 1 of 100</div>

<div class="card-container">
<div class="card" id="card" onclick="flipCard()">
<div class="card-inner">
<div class="card-front" id="cardFront"></div>
<div class="card-back" id="cardBack"></div>
</div>
</div>
</div>

<div class="nav-buttons">
<button class="btn-prev" onclick="prevCard()">Previous</button>
<button class="btn-next" onclick="nextCard()">Next</button>
</div>
</div>

<div class="table-view" id="tableView">
<h2>Complete Artwork Reference Table</h2>
<p style="color:#aaa;margin-bottom:15px;">Sortable by clicking column headers. Use Ctrl+F to search.</p>
<table id="artworkTable">
<thead>
<tr>
<th onclick="sortTable(0)">Period</th>
<th onclick="sortTable(1)">Artist</th>
<th onclick="sortTable(2)">Title</th>
<th onclick="sortTable(3)">Date</th>
<th onclick="sortTable(4)">Medium</th>
<th onclick="sortTable(5)">Location</th>
<th onclick="sortTable(6)">Key Features</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<script>
const artworks = [
// MEDIEVAL ITALY
{period:"medieval",artist:"Bonaventura Berlinghieri",title:"Saint Francis Altarpiece",date:"1235",medium:"Tempera on wood",location:"Pescia, Italy",features:"Earliest depiction of St. Francis; Byzantine style; flat gold background; flanking miracle scenes",fig:"14-1"},
{period:"medieval",artist:"Cimabue",title:"Madonna Enthroned with Angels and Prophets",date:"ca. 1280-1290",medium:"Tempera on wood",location:"Florence (Santa Trinita)",features:"Byzantine but hints of 3D; hierarchical scale; enthroned Virgin; gold ground",fig:"14-2"},
{period:"medieval",artist:"Giotto di Bondone",title:"Madonna Enthroned (Ognissanti Madonna)",date:"ca. 1310",medium:"Tempera on wood",location:"Florence",features:"Naturalistic weight/volume; throne with depth; angels in 3D space; compare to Cimabue",fig:"14-3"},
{period:"medieval",artist:"Giotto di Bondone",title:"Lamentation (Arena Chapel)",date:"ca. 1305",medium:"Fresco",location:"Padua, Italy",features:"Emotional realism; grief-stricken figures; diagonal composition to Christ; landscape setting",fig:"14-4"},
{period:"medieval",artist:"Giotto di Bondone",title:"Entry into Jerusalem (Arena Chapel)",date:"ca. 1305",medium:"Fresco",location:"Padua",features:"Narrative clarity; crowd scene; architectural backdrop",fig:"14-5"},
{period:"medieval",artist:"Giotto di Bondone",title:"Betrayal of Jesus (Arena Chapel)",date:"ca. 1305",medium:"Fresco",location:"Padua",features:"Dramatic confrontation; Judas kiss; compressed emotional figures",fig:"14-6"},
{period:"medieval",artist:"Duccio di Buoninsegna",title:"Maesta (Virgin and Child Enthroned)",date:"1308-1311",medium:"Tempera and gold on wood",location:"Siena Cathedral",features:"Sienese style: elegant, decorative, flowing lines; rich gold; large altarpiece",fig:"14-8"},
{period:"medieval",artist:"Duccio di Buoninsegna",title:"Betrayal of Jesus (back of Maesta)",date:"1308-1311",medium:"Tempera on wood",location:"Siena",features:"Compare to Giotto's version: more decorative, crowded, less monumental",fig:"14-9"},
{period:"medieval",artist:"Simone Martini",title:"Annunciation",date:"1333",medium:"Tempera and gold on wood",location:"Siena",features:"International Gothic elegance; sinuous lines; gold ground; Virgin recoils from Gabriel",fig:"14-10"},
{period:"medieval",artist:"Pietro Lorenzetti",title:"Birth of the Virgin",date:"1342",medium:"Tempera on wood",location:"Siena",features:"Innovative triptych: scene extends across panels as unified space; architectural depth",fig:"14-11"},
{period:"medieval",artist:"Ambrogio Lorenzetti",title:"Allegory/Effects of Good Government",date:"1338-1339",medium:"Fresco",location:"Palazzo Pubblico, Siena",features:"Secular political subject; panoramic city/countryside; earliest landscape painting",fig:"14-12"},

// NORTHERN EUROPE
{period:"northern",artist:"Claus Sluter",title:"Well of Moses",date:"1395-1406",medium:"Painted stone",location:"Dijon, France",features:"Monumental prophets; emotional realism; weighty drapery; Burgundian court",fig:"20-1"},
{period:"northern",artist:"Limbourg Brothers",title:"Les Tres Riches Heures du Duc de Berry",date:"1413-1416",medium:"Ink/tempera on vellum",location:"France",features:"Illuminated manuscript; International Gothic; calendar scenes; aristocratic life",fig:"20-2"},
{period:"northern",artist:"Robert Campin (Master of Flemalle)",title:"Merode Altarpiece (Annunciation Triptych)",date:"ca. 1425-1428",medium:"Oil on wood",location:"Tournai, Flanders",features:"Disguised symbolism: lilies, candle, mousetrap; domestic Annunciation setting",fig:"20-3"},
{period:"northern",artist:"Jan van Eyck",title:"Ghent Altarpiece (Adoration of the Mystic Lamb)",date:"1432",medium:"Oil on wood",location:"Ghent, Flanders",features:"Monumental polyptych; meticulous detail; revolutionary oil technique; theological program",fig:"20-4"},
{period:"northern",artist:"Jan van Eyck",title:"Giovanni Arnolfini and His Wife",date:"1434",medium:"Oil on wood",location:"Bruges, Flanders",features:"Disguised symbolism: convex mirror, single candle, dog (fidelity), removed shoes (holy ground)",fig:"20-6"},
{period:"northern",artist:"Jan van Eyck",title:"Man in a Red Turban (Self-Portrait?)",date:"1433",medium:"Oil on wood",location:"Bruges",features:"Three-quarter view; extraordinary detail; inscribed frame; possible self-portrait",fig:"20-7"},
{period:"northern",artist:"Rogier van der Weyden",title:"Deposition (Descent from the Cross)",date:"ca. 1435",medium:"Oil on wood",location:"Brussels/Leuven",features:"Emotional intensity; compressed shallow space; Mary echoes Christ's pose; gold background",fig:"20-8"},
{period:"northern",artist:"Rogier van der Weyden",title:"Saint Luke Drawing the Virgin",date:"ca. 1435-1440",medium:"Oil on wood",location:"Brussels",features:"Patron saint of painters; Rogier may be Luke; landscape through window",fig:"20-9"},
{period:"northern",artist:"Dirk Bouts",title:"Last Supper (Altarpiece of the Holy Sacrament)",date:"1464-1468",medium:"Oil on wood",location:"Leuven, Flanders",features:"One-point perspective (early Northern example); Eucharistic focus",fig:"20-11"},
{period:"northern",artist:"Hugo van der Goes",title:"Portinari Altarpiece (Adoration of Shepherds)",date:"ca. 1473-1478",medium:"Oil on wood",location:"Ghent/Florence",features:"Large scale; naturalistic shepherds; symbolic flowers (iris, columbine); sent to Florence",fig:"20-12"},
{period:"northern",artist:"Hans Memling",title:"Virgin with Saints and Angels (Saint John Altarpiece)",date:"1479",medium:"Oil on wood",location:"Bruges",features:"Serene, balanced; mystic marriage of Saint Catherine; luminous color",fig:"20-13"},
{period:"northern",artist:"Jean Fouquet",title:"Melun Diptych",date:"ca. 1452",medium:"Oil/tempera on wood",location:"Tours, France",features:"Flemish detail + Italian monumentality; idealized Virgin possibly modeled on Agnes Sorel",fig:"20-15"},
{period:"northern",artist:"Konrad Witz",title:"Miraculous Draft of Fish",date:"1444",medium:"Oil on wood",location:"Geneva, Switzerland",features:"First topographical landscape: recognizable Lake Geneva; biblical scene in real location",fig:"20-16"},
{period:"northern",artist:"Veit Stoss",title:"Death and Assumption of the Virgin",date:"1477-1489",medium:"Painted/gilded lime wood",location:"Krakow, Poland",features:"Monumental wooden altarpiece; Late Gothic expressiveness; carved figures",fig:"20-17"},
{period:"northern",artist:"Martin Schongauer",title:"Saint Anthony Tormented by Demons",date:"ca. 1480-1490",medium:"Engraving",location:"Colmar, Germany",features:"Masterful engraving; fantastic demons; influenced young Michelangelo",fig:"20-19"},

// EARLY RENAISSANCE (QUATTROCENTO)
{period:"early-ren",artist:"Filippo Brunelleschi",title:"Sacrifice of Isaac (competition panel)",date:"1401-1402",medium:"Gilded bronze",location:"Florence",features:"Baptistery door competition; emotional, angular; lost to Ghiberti",fig:"21-2"},
{period:"early-ren",artist:"Lorenzo Ghiberti",title:"Sacrifice of Isaac (competition panel)",date:"1401-1402",medium:"Gilded bronze",location:"Florence",features:"WON the competition; graceful classical pose; Isaac like Greek torso",fig:"21-3"},
{period:"early-ren",artist:"Donatello",title:"Saint Mark",date:"1411-1413",medium:"Marble",location:"Or San Michele, Florence",features:"Classical contrapposto; first Renaissance statue with convincing weight shift",fig:"21-5"},
{period:"early-ren",artist:"Donatello",title:"Saint George",date:"ca. 1410-1415",medium:"Marble",location:"Or San Michele, Florence",features:"Alert warrior; pioneering atmospheric perspective relief below",fig:"21-6"},
{period:"early-ren",artist:"Donatello",title:"Feast of Herod",date:"ca. 1423-1427",medium:"Gilded bronze",location:"Siena Baptistery",features:"Linear perspective in relief sculpture; dramatic recession; emotional reaction",fig:"21-8"},
{period:"early-ren",artist:"Lorenzo Ghiberti",title:"Gates of Paradise (east doors, Baptistery)",date:"1425-1452",medium:"Gilded bronze",location:"Florence",features:"10 pictorial panels; linear + atmospheric perspective; named by Michelangelo",fig:"21-10"},
{period:"early-ren",artist:"Donatello",title:"David",date:"ca. 1440-1460",medium:"Bronze",location:"Florence",features:"First freestanding nude male since antiquity; youthful contrapposto; Medici",fig:"21-11"},
{period:"early-ren",artist:"Andrea del Verrocchio",title:"David",date:"ca. 1465-1470",medium:"Bronze",location:"Florence",features:"Compare Donatello: older, alert, clothed, proud; wiry energy",fig:"21-12"},
{period:"early-ren",artist:"Antonio del Pollaiuolo",title:"Hercules and Antaeus",date:"ca. 1470-1475",medium:"Bronze",location:"Florence",features:"Violent action; anatomical study; struggle and energy",fig:"21-13"},
{period:"early-ren",artist:"Donatello",title:"Gattamelata (equestrian statue)",date:"ca. 1445-1453",medium:"Bronze",location:"Padua",features:"First large equestrian bronze since antiquity; references Marcus Aurelius; calm dignity",fig:"21-15"},
{period:"early-ren",artist:"Andrea del Verrocchio",title:"Bartolomeo Colleoni (equestrian)",date:"ca. 1481-1495",medium:"Bronze",location:"Venice",features:"More aggressive than Gattamelata; fierce expression; dynamic pose",fig:"21-16"},
{period:"early-ren",artist:"Gentile da Fabriano",title:"Adoration of the Magi",date:"1423",medium:"Tempera on wood",location:"Florence",features:"International Gothic: lavish gold, costumes, exotic animals; Strozzi Chapel",fig:"21-17"},
{period:"early-ren",artist:"Masaccio",title:"Tribute Money (Brancacci Chapel)",date:"ca. 1424-1427",medium:"Fresco",location:"Florence",features:"Revolutionary: atmospheric perspective, chiaroscuro, monumental figures, continuous narrative",fig:"21-18"},
{period:"early-ren",artist:"Masaccio",title:"Expulsion of Adam and Eve from Eden",date:"ca. 1424-1427",medium:"Fresco",location:"Florence (Brancacci Chapel)",features:"Raw emotion; naturalistic nudes; anguish and shame",fig:"21-19"},
{period:"early-ren",artist:"Masaccio",title:"Holy Trinity",date:"ca. 1424-1427",medium:"Fresco",location:"Santa Maria Novella, Florence",features:"First use of Brunelleschi's linear perspective in painting; trompe l'oeil; skeleton memento mori",fig:"21-20"},
{period:"early-ren",artist:"Fra Angelico",title:"Annunciation",date:"ca. 1438-1447",medium:"Fresco",location:"San Marco, Florence",features:"Simple, direct, devotional; gentle colors; for monks' cells; pure and humble",fig:"21-21"},
{period:"early-ren",artist:"Andrea del Castagno",title:"Last Supper",date:"1447",medium:"Fresco",location:"Sant'Apollonia, Florence",features:"Dramatic marble paneled setting; Judas isolated on opposite side of table",fig:"21-22"},
{period:"early-ren",artist:"Paolo Uccello",title:"Battle of San Romano",date:"ca. 1435-1460",medium:"Tempera on wood",location:"Florence",features:"Obsessive perspective; foreshortened fallen soldiers; decorative elements",fig:"21-23"},
{period:"early-ren",artist:"Fra Filippo Lippi",title:"Madonna and Child with Angels",date:"ca. 1460-1465",medium:"Tempera on wood",location:"Florence",features:"Humanized Madonna; gentle; landscape; influenced Botticelli",fig:"21-24"},
{period:"early-ren",artist:"Piero della Francesca",title:"Resurrection",date:"ca. 1463-1465",medium:"Fresco",location:"Borgo San Sepolcro",features:"Triumphant muscular Christ; sleeping soldiers; landscape death/rebirth symbolism",fig:"21-25"},
{period:"early-ren",artist:"Domenico Ghirlandaio",title:"Birth of the Virgin",date:"ca. 1485-1490",medium:"Fresco",location:"Santa Maria Novella, Florence",features:"Wealthy Florentine women in contemporary dress; secularization of sacred scene",fig:"21-26"},
{period:"early-ren",artist:"Sandro Botticelli",title:"Primavera (Spring)",date:"ca. 1482",medium:"Tempera on wood",location:"Florence (Uffizi)",features:"Mythological: Venus, Three Graces, Mercury, Flora; Medici; Neo-Platonic",fig:"21-28"},
{period:"early-ren",artist:"Sandro Botticelli",title:"Birth of Venus",date:"ca. 1484-1486",medium:"Tempera on canvas",location:"Florence (Uffizi)",features:"Revival of classical nude; Venus on shell; Zephyrus/Chloris; Neo-Platonic beauty",fig:"21-1"},
{period:"early-ren",artist:"Perugino",title:"Christ Delivering the Keys to Saint Peter",date:"1481-1483",medium:"Fresco",location:"Sistine Chapel, Vatican",features:"Central-plan temple; perfect perspective; papal authority symbolism",fig:"21-41"},
{period:"early-ren",artist:"Luca Signorelli",title:"The Damned Cast into Hell",date:"1499-1502",medium:"Fresco",location:"Orvieto Cathedral",features:"Muscular nudes; violent demons; influenced Michelangelo's Last Judgment",fig:"21-42"},
{period:"early-ren",artist:"Piero della Francesca",title:"Flagellation",date:"ca. 1455-1465",medium:"Oil and tempera on wood",location:"Urbino",features:"Perfect perspective; mysterious foreground figures; mathematical precision",fig:"21-43"},
{period:"early-ren",artist:"Piero della Francesca",title:"Battista Sforza and Federico da Montefeltro",date:"ca. 1472-1474",medium:"Oil/tempera on wood",location:"Urbino",features:"Profile portrait diptych; landscape backgrounds; power couple",fig:"21-44"},
{period:"early-ren",artist:"Filippo Brunelleschi",title:"Ospedale degli Innocenti (loggia)",date:"begun 1419",medium:"Stone/stucco",location:"Florence",features:"First Renaissance building; classical columns; modular design; roundels",fig:"21-30"},
{period:"early-ren",artist:"Filippo Brunelleschi",title:"San Lorenzo (interior)",date:"ca. 1421-1460",medium:"Stone",location:"Florence",features:"Mathematical clarity; Corinthian columns; pietra serena gray vs white walls",fig:"21-31"},
{period:"early-ren",artist:"Leon Battista Alberti",title:"Sant'Andrea (facade)",date:"designed 1470",medium:"Stone",location:"Mantua",features:"Triumphal arch + temple front; colossal order; Roman motifs",fig:"21-45"},
{period:"early-ren",artist:"Andrea Mantegna",title:"Camera Picta (ceiling/oculus)",date:"1465-1474",medium:"Fresco",location:"Palazzo Ducale, Mantua",features:"Di sotto in su (seen from below); first illusionistic ceiling; putti peer down through oculus",fig:"21-48"},
{period:"early-ren",artist:"Andrea Mantegna",title:"Foreshortened Christ (Lamentation)",date:"ca. 1500",medium:"Tempera on canvas",location:"Milan",features:"Extreme foreshortening; emotional restraint; anatomical virtuosity",fig:"21-50"},
{period:"early-ren",artist:"Giovanni Bellini",title:"Saint Francis in the Desert",date:"ca. 1477-1480",medium:"Oil on wood",location:"Venice",features:"Luminous landscape; Franciscan mysticism; pioneering Venetian light/color",fig:"21-40"},

// HIGH RENAISSANCE
{period:"high-ren",artist:"Leonardo da Vinci",title:"Madonna of the Rocks",date:"ca. 1483-1490",medium:"Oil on wood/canvas",location:"Milan/Paris",features:"Sfumato; pyramidal composition; grotto; chiaroscuro; mysterious atmosphere",fig:"22-2"},
{period:"high-ren",artist:"Leonardo da Vinci",title:"Last Supper",date:"ca. 1495-1498",medium:"Oil/tempera on plaster",location:"Santa Maria delle Grazie, Milan",features:"Experimental medium (deteriorated); one-point perspective; psychological drama of reactions",fig:"22-4"},

{period:"high-ren",artist:"Raphael",title:"Madonna of the Meadows",date:"1505-1506",medium:"Oil on wood",location:"Florence",features:"Pyramidal composition; Leonardo influence; sfumato; gentle landscape",fig:"22-8"},
{period:"high-ren",artist:"Raphael",title:"School of Athens",date:"1509-1511",medium:"Fresco",location:"Stanza della Segnatura, Vatican",features:"Plato (up) & Aristotle (out); barrel vault; portraits of contemporaries as philosophers",fig:"22-9"},
{period:"high-ren",artist:"Raphael",title:"Galatea",date:"ca. 1513",medium:"Fresco",location:"Villa Farnesina, Rome",features:"Mythological; dynamic spiral composition; classical beauty; Neoplatonic",fig:"22-11"},
{period:"high-ren",artist:"Michelangelo",title:"Pieta",date:"ca. 1498-1500",medium:"Marble",location:"St. Peter's, Vatican",features:"Young Virgin holding dead Christ; polished marble; pyramidal; beauty from suffering",fig:"22-12"},
{period:"high-ren",artist:"Michelangelo",title:"David",date:"1501-1504",medium:"Marble",location:"Florence",features:"17 ft colossal; tense anticipation before battle; veins/muscles; civic symbol; idealized",fig:"22-13"},
{period:"high-ren",artist:"Michelangelo",title:"Moses",date:"ca. 1513-1515",medium:"Marble",location:"San Pietro in Vincoli, Rome",features:"Tomb of Julius II; powerful patriarch; horns (mistranslation of rays); terribilita",fig:"22-14"},
{period:"high-ren",artist:"Michelangelo",title:"Tomb of Giuliano de' Medici",date:"1519-1534",medium:"Marble",location:"New Sacristy, San Lorenzo, Florence",features:"Night and Day allegorical reclining figures; architectural setting; meditation on time",fig:"22-16"},
{period:"high-ren",artist:"Michelangelo",title:"Sistine Chapel Ceiling (Creation of Adam)",date:"1508-1512",medium:"Fresco",location:"Vatican, Rome",features:"300+ figures; Genesis; architectural framework; near-touching fingers = most iconic image",fig:"22-17/18"},

let currentIndex = 0;
let filteredCards = [...artworks];
let quizMode = 'show-image';

const periodLabels = {
'medieval': 'Late Medieval',
'northern': 'Northern Renaissance',
'early-ren': 'Early Renaissance',
'high-ren': 'High Renaissance',
'mannerism': 'Mannerism',
'baroque': 'Baroque'
};

const periodClass = {
'medieval': 'medieval',
'northern': 'northern',
'early-ren': 'early-ren',
'high-ren': 'high-ren',
'mannerism': 'mannerism',
'baroque': 'baroque'
};

function renderCard() {
const card = document.getElementById('card');
card.classList.remove('flipped');
const art = filteredCards[currentIndex];
if (!art) return;

const front = document.getElementById('cardFront');
const back = document.getElementById('cardBack');
const tag = `<span class="period-tag ${periodClass[art.period]}">${periodLabels[art.period]}</span>`;

if (quizMode === 'show-image') {
front.innerHTML = `${tag}<h2>${art.title}</h2><p class="prompt">Who made this? When? What medium?</p><p class="hint">Fig. ${art.fig}</p><p class="click-hint">Click to reveal answer</p>`;
} else if (quizMode === 'show-details') {
front.innerHTML = `${tag}<p class="prompt"><strong>Artist:</strong> ${art.artist}<br><strong>Date:</strong> ${art.date}<br><strong>Medium:</strong> ${art.medium}<br><strong>Location:</strong> ${art.location}</p><p class="hint">What is the title of this work?</p><p class="click-hint">Click to reveal</p>`;
} else {
front.innerHTML = `<h2>${art.title}</h2><p class="prompt">by ${art.artist}, ${art.date}</p><p class="hint">What period/style is this?</p><p class="click-hint">Click to reveal</p>`;
}

back.innerHTML = `
<span class="period-tag ${periodClass[art.period]}">${periodLabels[art.period]}</span>
<h3>${art.artist}</h3>
<div class="detail"><span>Title:</span> ${art.title}</div>
<div class="detail"><span>Date:</span> ${art.date}</div>
<div class="detail"><span>Medium:</span> ${art.medium}</div>
<div class="detail"><span>Location:</span> ${art.location}</div>
<div class="detail"><span>Fig:</span> ${art.fig}</div>
<div class="iconography">${art.features}</div>
`;

document.getElementById('stats').textContent = `Card ${currentIndex + 1} of ${filteredCards.length}`;
}

function flipCard() {
document.getElementById('card').classList.toggle('flipped');
}

function nextCard() {
currentIndex = (currentIndex + 1) % filteredCards.length;
renderCard();
}

function prevCard() {
currentIndex = (currentIndex - 1 + filteredCards.length) % filteredCards.length;
renderCard();
}

function setMode(period, btn) {
document.querySelectorAll('.mode-selector button').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
if (period === 'all') {
filteredCards = [...artworks];
} else {
filteredCards = artworks.filter(a => a.period === period);
}
currentIndex = 0;
renderCard();
}

function setQuizMode(mode) {
quizMode = mode;
renderCard();
}

function shuffleCards() {
for (let i = filteredCards.length - 1; i > 0; i--) {
const j = Math.floor(Math.random() * (i + 1));
[filteredCards[i], filteredCards[j]] = [filteredCards[j], filteredCards[i]];
}
currentIndex = 0;
renderCard();
}

function toggleView() {
const fv = document.getElementById('flashcardView');
const tv = document.getElementById('tableView');
const btn = document.getElementById('viewToggle');
if (tv.style.display === 'none' || !tv.style.display) {
tv.style.display = 'block';
fv.style.display = 'none';
btn.textContent = 'Switch to Flashcard View';
renderTable();
} else {
tv.style.display = 'none';
fv.style.display = 'block';
btn.textContent = 'Switch to Table View';
}
}

function renderTable() {
const tbody = document.getElementById('tableBody');
tbody.innerHTML = artworks.map(a => `<tr>
<td><span class="period-tag ${periodClass[a.period]}">${periodLabels[a.period]}</span></td>
<td>${a.artist}</td><td>${a.title}</td><td>${a.date}</td>
<td>${a.medium}</td><td>${a.location}</td><td>${a.features}</td>
</tr>`).join('');
}

let sortDir = 1;
function sortTable(col) {
const rows = Array.from(document.getElementById('tableBody').rows);
sortDir *= -1;
rows.sort((a, b) => {
const av = a.cells[col].textContent;
const bv = b.cells[col].textContent;
return av.localeCompare(bv) * sortDir;
});
const tbody = document.getElementById('tableBody');
rows.forEach(r => tbody.appendChild(r));
}

document.addEventListener('keydown', (e) => {
if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextCard();
else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevCard();
else if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

renderCard();
</script>
</body>
</html>
